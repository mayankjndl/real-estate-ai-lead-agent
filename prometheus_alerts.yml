groups:
  - name: revenue_os_alerts
    rules:
      - alert: HighErrorRate
        expr: sum(rate(http_requests_total{http_status=~"5.."}[1m])) / sum(rate(http_requests_total[1m])) * 100 > 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High Error Rate Detected"
          description: "The API is returning more than 5% HTTP 5xx errors over the last 2 minutes."

      - alert: HighLatency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 3.0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "p95 Latency SLA Breach"
          description: "The 95th percentile latency has exceeded 3000ms (3.0s) for the last 2 minutes."

      - alert: BackgroundTaskFailures
        expr: increase(background_failures_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Background Task Failures Detected"
          description: "A background task (CRM sync, Twilio Outbound, or Scheduler) has failed and written an event to the Dead-Letter Queue (DLQ)."
